<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/css/style.css">
    <title>English Master</title>
</head>

<body>

    <div id="home-screen" style="text-align: center; padding: 50px;">
        <h1>Last tests low intermediate level tests</h1>
        <div class="grid">
            <button onclick="startQuiz('phonetics')">Phonetics</button>
            <button onclick="startQuiz('gerundsInfinitives')">Gerunds & Infinitives</button>
            <button onclick="startQuiz('soSuch')">So Such</button>
            <button onclick="startQuiz('phrasalVerbs')">Phrasal Verbs</button>
        </div>
    </div>

    <div id="quiz-container" style="display: none;">
        <button onclick="location.reload()">Volver al menú</button>
        <div id="stats">Puntos: <span id="score">0</span> | Racha: <span id="streak">0</span></div>

        <h3 id="question">Cargando...</h3>
        <button id="btn-audio">🔊 Escuchar pregunta</button>
        <div id="options"></div>

        <button id="btn-show-hint">💡 Ver pista</button>
        <p id="hint-text" style="display: none;"></p>

        <button id="btn-next" style="display: none;">Siguiente pregunta →</button>
    </div>

    <script type="module" src="Assets/js/app.js"></script>
</body>

</html>
